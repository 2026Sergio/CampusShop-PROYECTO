<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusShop | Inicio</title>
    <link rel="stylesheet" href="CSS/base.css">
    <link rel="stylesheet" href="CSS/layout.css">
    <link rel="stylesheet" href="CSS/components.css">
    <link rel="stylesheet" href="CSS/responsive.css">
</head>
<body>
    <input type="checkbox" id="btn-menu">

    <aside class="sidebar">
        <div class="sidebar-header">
            <img src="IMG/LOGOS/icono1.png" alt="Logo CampusShop" class="logo-sidebar">
            <h2>CampusShop</h2>
            <label for="btn-menu" class="close-icon">cerrar barra</label>
        </div>
        <nav>
            <ul>
                <li class="active"><a href="index.html">☰ Home</a></li>
                <li><a href="productos de html/abrigos.html">Abrigos</a></li>
                <li><a href="productos de html/camisas.html">Camisetas</a></li>
                <li><a href="productos de html/pantalon.html">Pantalones</a></li>
                <hr>
                <li><a href="catalogo.html">Catalogo</a></li>
                <li><a href="perfil.html">Perfil</a></li>
                <li><a href="carrito.html">Carrito</a></li>
            </ul>
        </nav>
    </aside>

    <div class="content-wrapper">
        <header>
            <label for="btn-menu" class="hamburguesa">☰</label>
            <h1>CampusShop</h1>
            <img src="IMG/LOGOS/icono1.png" alt="Logo CampusShop" class="logo-sidebar">
            <a href="perfil.html" class="profile-link">Perfil</a>
        </header>

        <main>
            <section id="busqueda">
                <input type="text" placeholder="Buscar tecnología o equipo...">
            </section>

            <section id="productos-destacados">
                <h2>Productos Destacados</h2>
                <div class="grid-container">
                    <article class="card">
                        <img src="IMG/ROPA/ABRIGOS/abrigo1.jpg" alt="Abrigo">
                        <div class="card-info">
                            <h3>Abrigo </h3>
                            <p>Q.599.99</p>
                            <a href="productos de html/producto.html">Detalles</a>
                        </div>
                    </article>
                    <article class="card">
                        <img src="IMG/ROPA/CAMISAS/camisa1.jpg" alt="Camisa">
                        <div class="card-info">
                            <h3>Camisa Negra</h3>
                            <p>Q.129.99.00</p>
                            <a href="productos de html/producto.html">Detalles</a>
                        </div>
                    </article>
                    <article class="card">
                        <img src="IMG/ROPA/CAMISAS/camisa2.jpg" alt="Camiseta">
                        <div class="card-info">
                            <h3>Camisa Blanca</h3>
                            <p>Q.224.99</p>
                            <a href="productos de html/producto.html">Detalles</a>
                        </div>
                    </article>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 CampusShop - Sergio Ajú</p>
            <a href="historial.html">Ver Historial</a>
        </footer>
    </div>
</body>
</html>
